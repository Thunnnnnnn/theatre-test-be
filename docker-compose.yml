services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: theatre-api
    ports:
      - "8080:8080"
    environment:
      MONGO_URI: mongodb://admin:password@mongodb:27017/theatre?authSource=admin
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: theatre-test-redis
      KAFKA_BROKER: kafka:9092
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongodb
      - redis
      - kafka

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: theatre-worker
    environment:
      MONGO_URI: mongodb://admin:password@mongodb:27017/theatre?authSource=admin
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: theatre-test-redis
      KAFKA_BROKER: kafka:9092
    depends_on:
      - mongodb
      - redis
      - kafka

  mongodb:
    image: mongo:8
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass theatre-test-redis

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
